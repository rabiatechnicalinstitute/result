<script>
function verifyCertificate() {
  var id = document.getElementById("certId").value;

  if(id === "12345") {
    window.open("shadab.pdf", "_blank");
  }
  else if(id === "67890") {
    window.open("ali.pdf", "_blank");
  }
  else {
    alert("Invalid Certificate ID");
  }
}
</script>
